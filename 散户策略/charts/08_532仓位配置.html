<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>532仓位配置</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .chart-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }
        canvas { max-height: 300px; }
        .config-list {
            list-style: none;
        }
        .config-list li {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .config-list .icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stable { background: #bee3f8; }
        .growth { background: #c6f6d5; }
        .cash { background: #feebc8; }
        .config-list .info h3 { font-size: 16px; color: #2d3748; margin-bottom: 4px; }
        .config-list .info p { font-size: 13px; color: #718096; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 {
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .legend-note p {
            color: #4a5568;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>💰 532仓位配置法则</h1>
        <p class="subtitle">50%稳定资产 + 30%成长资产 + 20%现金</p>
        
        <div class="chart-wrapper">
            <canvas id="pieChart"></canvas>
            <ul class="config-list">
                <li>
                    <div class="icon stable">🏦</div>
                    <div class="info">
                        <h3>50% 稳定资产</h3>
                        <p>宽基ETF（沪深300、中证500）<br>高股息蓝筹股</p>
                    </div>
                </li>
                <li>
                    <div class="icon growth">🚀</div>
                    <div class="info">
                        <h3>30% 成长资产</h3>
                        <p>行业ETF、优质成长股<br>可转债双低策略</p>
                    </div>
                </li>
                <li>
                    <div class="icon cash">💵</div>
                    <div class="info">
                        <h3>20% 现金仓位</h3>
                        <p>货币基金、国债逆回购<br>等待机会的"子弹"</p>
                    </div>
                </li>
            </ul>
        </div>
        
        <div class="legend-note">
            <h3>💡 仓位管理核心原则</h3>
            <p>
                <strong>动态再平衡</strong>：每季度或每半年检视，偏离超过10%则调回目标比例<br>
                <strong>金字塔加仓</strong>：越跌越买，但每次加仓金额递减<br>
                <strong>最大亏损控制</strong>：单一个股最大亏损不超过总资金的10%
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('pieChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['50% 稳定资产', '30% 成长资产', '20% 现金仓位'],
                datasets: [{
                    data: [50, 30, 20],
                    backgroundColor: [
                        'rgba(49, 130, 206, 0.85)',
                        'rgba(56, 161, 105, 0.85)',
                        'rgba(237, 137, 54, 0.85)'
                    ],
                    borderColor: [
                        '#2b6cb0',
                        '#276749',
                        '#c05621'
                    ],
                    borderWidth: 3,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                cutout: '55%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 20,
                            usePointStyle: true,
                            font: { size: 14, weight: 'bold' }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const label = context.label;
                                const value = context.parsed;
                                return label + ': ' + value + '%';
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
