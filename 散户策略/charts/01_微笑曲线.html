<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微笑曲线 - 定投策略</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        canvas { max-height: 400px; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 {
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .legend-note p {
            color: #4a5568;
            font-size: 13px;
            line-height: 1.6;
        }
        .highlight {
            color: #e53e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>📈 定投微笑曲线原理图</h1>
        <p class="subtitle">价格下跌时积累份额，回升时实现盈利 - 数据来源：案例模拟</p>
        <canvas id="smileCurveChart"></canvas>
        <div class="legend-note">
            <h3>💡 微笑曲线解读</h3>
            <p>
                <strong>阶段1（高点开始）</strong>：每月固定投入2000元，价格下跌时买的份额更多。<br>
                <strong>阶段2（谷底积累）</strong>：累计份额持续增加，平均成本不断降低。<br>
                <strong>阶段3（回升盈利）</strong>：价格回升，由于份额多，成本低，<span class="highlight">迅速扭亏为盈</span>。
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('smileCurveChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                datasets: [
                    {
                        label: '基金价格（元）',
                        data: [2.0, 1.8, 1.6, 1.4, 1.2, 1.0, 1.1, 1.3, 1.5, 1.7, 1.9, 2.1],
                        borderColor: '#e53e3e',
                        backgroundColor: 'rgba(229, 62, 62, 0.1)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y',
                        pointRadius: 5,
                        pointBackgroundColor: '#e53e3e'
                    },
                    {
                        label: '累计份额（份）',
                        data: [1000, 2111, 3361, 4791, 6451, 8451, 10069, 11198, 12084, 12771, 13324, 13777],
                        borderColor: '#3182ce',
                        backgroundColor: 'rgba(49, 130, 206, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        yAxisID: 'y1',
                        pointRadius: 5,
                        pointBackgroundColor: '#3182ce'
                    },
                    {
                        label: '平均成本（元）',
                        data: [2.00, 1.90, 1.79, 1.67, 1.55, 1.42, 1.38, 1.35, 1.33, 1.31, 1.30, 1.30],
                        borderColor: '#38a169',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y',
                        pointRadius: 4,
                        pointBackgroundColor: '#38a169'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 20,
                            font: { size: 12 }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 12,
                        titleFont: { size: 14 },
                        bodyFont: { size: 13 },
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y.toFixed(2);
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: {
                            display: true,
                            text: '价格 / 成本（元）'
                        },
                        min: 0.5,
                        max: 2.5,
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: {
                            display: true,
                            text: '累计份额（份）'
                        },
                        min: 0,
                        max: 15000,
                        grid: { drawOnChartArea: false }
                    },
                    x: {
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    }
                }
            }
        });
    </script>
</body>
</html>
