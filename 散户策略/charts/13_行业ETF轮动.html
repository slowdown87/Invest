<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业ETF轮动 - 策略13</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 { color: #2d3748; text-align: center; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #718096; text-align: center; margin-bottom: 25px; font-size: 14px; }
        canvas { max-height: 400px; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 { color: #2d3748; font-size: 14px; margin-bottom: 8px; }
        .legend-note p { color: #4a5568; font-size: 13px; line-height: 1.6; }
        .highlight { color: #3182ce; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>🔄 行业ETF轮动原理图</h1>
        <p class="subtitle">通过行业轮动持续捕捉机会，年化15-20%，规避个股风险</p>
        <canvas id="rotationChart"></canvas>
        <div class="legend-note">
            <h3>💡 轮动策略解读</h3>
            <p>
                <strong>筛选维度</strong>：业绩景气+政策支持+资金流向+技术面，四维度缺一不可。<br>
                <strong>轮动规则</strong>：原行业破20日均线卖出，新行业出现买点买入。<br>
                <strong>仓位控制</strong>：单只ETF≤20%，持仓3-5个，预留20%现金。<br>
                <strong>关键时点</strong>：每年<span class="highlight">4-5月、8-9月</span>是行业轮动最佳时机。
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rotationChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                datasets: [
                    {
                        label: 'AI科技ETF',
                        data: [20, 45, 35, 20],
                        borderColor: '#805ad5',
                        backgroundColor: 'rgba(128, 90, 213, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '消费ETF',
                        data: [10, 15, 28, 32],
                        borderColor: '#dd6b20',
                        backgroundColor: 'rgba(221, 107, 32, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '医药ETF',
                        data: [5, 8, 12, 18],
                        borderColor: '#38a169',
                        backgroundColor: 'rgba(56, 161, 105, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '累计收益',
                        data: [5, 22, 35, 28],
                        borderColor: '#e53e3e',
                        backgroundColor: 'transparent',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { usePointStyle: true, padding: 20, font: { size: 12 } }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y + '%';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        position: 'left',
                        title: { display: true, text: '涨幅 (%)' },
                        min: -5,
                        max: 50,
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: { grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    </script>
</body>
</html>
