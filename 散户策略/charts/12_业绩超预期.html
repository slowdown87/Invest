<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业绩超预期驱动 - 策略12</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        canvas { max-height: 400px; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #dd6b20;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 { color: #2d3748; font-size: 14px; margin-bottom: 8px; }
        .legend-note p { color: #4a5568; font-size: 13px; line-height: 1.6; }
        .highlight { color: #dd6b20; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>📊 业绩超预期驱动原理图</h1>
        <p class="subtitle">超预期幅度越大，股价涨幅越大，胜率越高</p>
        <canvas id="earningChart"></canvas>
        <div class="legend-note">
            <h3>💡 超预期操作解读</h3>
            <p>
                <strong>筛选标准</strong>：扣非净利润超预期30%以上+基本面无问题。<br>
                <strong>买入时机</strong>：业绩披露次日高开<5%企稳后介入。<br>
                <strong>卖出时机</strong>：连续3日不创新高止盈，跌破前日收盘价3%止损。<br>
                <strong>关键数据</strong>：<span class="highlight">超预期>50%的股票，5日涨幅均值+8.5%，胜率82%</span>。
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('earningChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['超预期>50%', '超预期30-50%', '超预期10-30%', '符合预期', '低于预期'],
                datasets: [
                    {
                        label: '5日涨幅均值 (%)',
                        data: [8.5, 5.2, 3.1, 0.5, -2.3],
                        backgroundColor: ['#38a169', '#68d391', '#9ae6b4', '#a0aec0', '#fc8181'],
                        borderColor: ['#38a169', '#68d391', '#9ae6b4', '#a0aec0', '#fc8181'],
                        borderWidth: 1
                    },
                    {
                        label: '20日涨幅均值 (%)',
                        data: [15.2, 10.3, 6.5, 1.2, -5.8],
                        backgroundColor: ['#dd6b20', '#ed8936', '#f6ad55', '#cbd5e0', '#f56565'],
                        borderColor: ['#dd6b20', '#ed8936', '#f6ad55', '#cbd5e0', '#f56565'],
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { usePointStyle: true, padding: 20, font: { size: 12 } }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y + '%';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        position: 'left',
                        title: { display: true, text: '涨幅 (%)' },
                        min: -10,
                        max: 20,
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: { grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    </script>
</body>
</html>
