<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主线趋势波段 - 策略11</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        canvas { max-height: 400px; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #805ad5;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 {
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .legend-note p {
            color: #4a5568;
            font-size: 13px;
            line-height: 1.6;
        }
        .highlight { color: #805ad5; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>📈 主线趋势波段原理图</h1>
        <p class="subtitle">主线涨幅是大盘3-5倍，顺势而为收益更高</p>
        <canvas id="mainTrendChart"></canvas>
        <div class="legend-note">
            <h3>💡 主线波段操作解读</h3>
            <p>
                <strong>阶段1（识别主线）</strong>：政策+业绩+资金共振确认主线，4大信号缺一不可。<br>
                <strong>阶段2（回踩买入）</strong>：等回踩10日/20日均线买入，不追高。<br>
                <strong>阶段3（持有主升）</strong>：让利润奔跑，缩量回调是正常洗盘。<br>
                <strong>阶段4（止盈离场）</strong>：<span class="highlight">跌破20日均线3日不收回，无条件止盈</span>。
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('mainTrendChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                datasets: [
                    {
                        label: '主线板块涨幅 (%)',
                        data: [5, 18, 25, 35, 48, 55, 62, 68, 72, 75, 70, 68],
                        borderColor: '#805ad5',
                        backgroundColor: 'rgba(128, 90, 213, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        yAxisID: 'y',
                        pointRadius: 5,
                        pointBackgroundColor: '#805ad5'
                    },
                    {
                        label: '大盘涨幅 (%)',
                        data: [2, 5, 8, 12, 15, 18, 20, 22, 24, 25, 24, 22],
                        borderColor: '#e53e3e',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y',
                        pointRadius: 4,
                        pointBackgroundColor: '#e53e3e'
                    },
                    {
                        label: '累计超额收益 (%)',
                        data: [0, 13, 17, 23, 33, 37, 42, 46, 48, 50, 46, 46],
                        borderColor: '#38a169',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y1',
                        pointRadius: 5,
                        pointBackgroundColor: '#38a169'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { usePointStyle: true, padding: 20, font: { size: 12 } }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y + '%';
                            }
                        }
                    },
                    annotation: {
                        annotations: {
                            buyZone: {
                                type: 'box',
                                yMin: 20,
                                yMax: 40,
                                backgroundColor: 'rgba(56, 161, 105, 0.1)',
                                label: { content: '买入区间', enabled: true }
                            },
                            sellZone: {
                                type: 'box',
                                yMin: 65,
                                yMax: 80,
                                backgroundColor: 'rgba(229, 62, 62, 0.1)',
                                label: { content: '止盈区间', enabled: true }
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        position: 'left',
                        title: { display: true, text: '涨幅 (%)' },
                        min: -10,
                        max: 80,
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    y1: {
                        type: 'linear',
                        position: 'right',
                        title: { display: true, text: '超额收益 (%)' },
                        min: -10,
                        max: 60,
                        grid: { drawOnChartArea: false }
                    },
                    x: { grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    </script>
</body>
</html>
