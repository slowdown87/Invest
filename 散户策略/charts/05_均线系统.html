<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>均线系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        canvas { max-height: 400px; }
        .ma-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .ma-card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            background: linear-gradient(135deg, #f7fafc, #edf2f7);
        }
        .ma-card h3 { font-size: 16px; margin-bottom: 8px; }
        .ma-card .period { font-size: 20px; font-weight: bold; color: #3182ce; }
        .ma-card .desc { font-size: 12px; color: #718096; margin-top: 5px; }
        .legend-note {
            background: #f7fafc;
            border-left: 4px solid #805ad5;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
        }
        .legend-note h3 {
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .legend-note p {
            color: #4a5568;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>📈 20日均线"人线合一"策略</h1>
        <p class="subtitle">三种核心均线 | 股价与均线的位置关系决定操作</p>
        <canvas id="maChart"></canvas>
        
        <div class="ma-info">
            <div class="ma-card">
                <h3>🌟 20日均线</h3>
                <div class="period">中期生命线</div>
                <div class="desc">判断中期趋势核心分界线<br>最适合散户深耕</div>
            </div>
            <div class="ma-card">
                <h3>☀️ 5日均线</h3>
                <div class="period">短期攻击线</div>
                <div class="desc">反映近一周市场成本<br>短线操作参考</div>
            </div>
            <div class="ma-card">
                <h3>🌙 60日均线</h3>
                <div class="period">长期决策线</div>
                <div class="desc">代表近三月持仓成本<br>中长线趋势判断</div>
            </div>
        </div>
        
        <div class="legend-note">
            <h3>💡 人线合一操作要点</h3>
            <p>
                <strong>线上持仓</strong>：股价站稳20日均线且均线向上 → 持有/买入<br>
                <strong>线下空仓</strong>：股价跌破20日均线且均线向下 → 卖出/空仓<br>
                <strong>核心铁律</strong>：不猜顶、不猜底、不信杂讯，只以均线信号为准
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('maChart').getContext('2d');
        
        const days = Array.from({length: 30}, (_, i) => `第${i+1}天`);
        
        // 模拟股价和均线
        const price = [100, 98, 96, 95, 97, 99, 102, 105, 103, 101, 99, 100, 102, 105, 108, 110, 108, 106, 104, 105, 107, 110, 112, 115, 113, 111, 109, 110, 112, 115];
        const ma5 = [100, 99, 98, 97, 97, 98, 99, 100, 101, 101, 100, 100, 100, 101, 102, 103, 104, 105, 105, 105, 105, 106, 107, 108, 108, 109, 109, 109, 109, 110];
        const ma20 = [102, 101, 100, 100, 100, 100, 100, 100, 99, 99, 99, 99, 99, 99, 100, 100, 100, 100, 100, 100, 100, 101, 101, 101, 102, 102, 102, 102, 102, 102];
        const ma60 = [105, 104, 104, 103, 103, 103, 103, 103, 103, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 102, 103, 103, 103, 103, 103];
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: days,
                datasets: [
                    {
                        label: '股价',
                        data: price,
                        borderColor: '#1a1a2e',
                        backgroundColor: function(context) {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, 'rgba(26, 26, 46, 0.05)');
                            gradient.addColorStop(1, 'rgba(26, 26, 46, 0.2)');
                            return gradient;
                        },
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4
                    },
                    {
                        label: '5日均线',
                        data: ma5,
                        borderColor: '#38a169',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: '20日均线',
                        data: ma20,
                        borderColor: '#3182ce',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: '60日均线',
                        data: ma60,
                        borderColor: '#805ad5',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 0,
                        borderDash: [5, 5]
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 15,
                            font: { size: 12 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y.toFixed(2) + '元';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        min: 90,
                        max: 120,
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: {
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: {
                            maxTicksLimit: 10
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
